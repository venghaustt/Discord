name: Daily ADA Discord Report

on:
  schedule:
    # Runs every day at 14:00 UTC (9:00 AM CDT / 8:00 AM CST)
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-ada-report:
    name: Send ADA Daily Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify repository secrets
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "❌ DISCORD_WEBHOOK_URL is missing."
            exit 1
          fi

          if [ -z "$CMC_API_KEY" ]; then
            echo "❌ CMC_API_KEY is missing."
            exit 1
          fi

          echo "✅ Repository secrets found."

      - name: Send ADA report to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
        run: python ada_daily.py
